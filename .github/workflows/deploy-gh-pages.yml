name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/$REPO_NAME/"
          fi
          npm run build -- --configuration production --base-href "$BASE_HREF"

      - name: Resolve deploy directory
        id: resolve_dir
        run: |
          if [ -f dist/angular2026/browser/index.html ]; then
            DEPLOY_DIR="dist/angular2026/browser"
          elif [ -f dist/angular2026/index.html ]; then
            DEPLOY_DIR="dist/angular2026"
          else
            DEPLOY_DIR="$(find dist -type f -name index.html | head -n 1 | xargs dirname)"
          fi

          if [ -z "$DEPLOY_DIR" ] || [ ! -f "$DEPLOY_DIR/index.html" ]; then
            echo "Could not find build output with index.html under dist/"
            exit 1
          fi

          echo "Resolved deploy directory: $DEPLOY_DIR"
          echo "dir=$DEPLOY_DIR" >> "$GITHUB_OUTPUT"

      - name: SPA fallback for GitHub Pages
        run: cp "${{ steps.resolve_dir.outputs.dir }}/index.html" "${{ steps.resolve_dir.outputs.dir }}/404.html"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.resolve_dir.outputs.dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
