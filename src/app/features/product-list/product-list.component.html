<app-product-list-view
  [loading]="productFacade.loading()"
  [error]="productFacade.error()"
  [products]="productFacade.filteredProducts()"
  [filters]="productFacade.filters()"
  (searchTermChange)="onSearchTermChange($event.toString())"
  (minPriceChange)="onMinPriceChange($event)"
  (maxPriceChange)="onMaxPriceChange($event)"
  (clearFilters)="clearFilters()"
  (addToCart)="addToCart($event)"
></app-product-list-view>
